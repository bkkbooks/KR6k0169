body:
  text: 唐有大士諱道宣字法徧天縱神悟深入法華涅槃骨髓決了戒律即是圓乘自撰戒疏羯磨疏行事鈔諸書於是乎毗尼之學大傳于天下所謂自佛滅後像法住世興發戒律者但此師一人而已其后吾門高僧名賢為之記者亡慮六十餘家雖然祖師所製文法簡古義趣隱微以故諸家多失祖意唯宋大智律師蚤以頴悟之恣銳意于律克究文旨甚得祖意因著行宗濟緣資持諸記悉釋彼文識者以為其超過六十餘家釋義之外矣元祿壬午春三月梓氏某來出行事鈔資持記序解并五例講義一本強請余挍讎之以流通本余歡然諾焉疾披讀之乃大智之高第弟子則安律師所撰也按僧傳未詳其姓氏鄉里曾述茲書及隨機羯磨序解等徧行于世見其所明禦侮救弊發揮宗旨不特究律學廣涉三藏九流之典其亦有功於我宗甚大矣未一旬校讎既成因授梓氏令其刻之南京唐招提寺沙門釋貫光戒月䖍書于應量坊
